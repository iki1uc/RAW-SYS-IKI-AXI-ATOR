<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ERROR :: WATSON MONITOR</title>

<style>
  body {
    background:#000;
    color:#0f0;
    font-family:monospace;
    padding:20px;
  }
  .cube {
    border:1px solid #0f0;
    padding:10px;
    margin:10px;
    width:260px;
    display:inline-block;
    animation:pulse 1.2s infinite;
  }
  @keyframes pulse {
    0% { opacity:0.4; }
    50% { opacity:1; }
    100% { opacity:0.4; }
  }
  .title {
    color:#0ff;
    font-size:20px;
    margin-bottom:10px;
  }
</style>

<script>
const cubes = [
  {name:"CUBE-0 FUNDAMENT", status:"GRÜN", info:"checksum OK"},
  {name:"CUBE-1 FORM", status:"GRÜN", info:"prefix MATCH"},
  {name:"CUBE-2 SCHUTZ", status:"GRÜN", info:"redundancy queued"},
  {name:"CUBE-3 BEWEGUNG", status:"neutral", info:"idle | micro-impulse-ready"},
  {name:"CLEAN KLARHEIT", status:"GRÜN", info:"noise low"},
  {name:"SHINE SICHTBAR", status:"GRÜN", info:"channel open"},
  {name:"LIVE ECHTZEIT", status:"GRÜN", info:"latency <5ms"}
];

window.onload = () => {
  const out = document.getElementById("out");
  cubes.forEach(c=>{
    const div = document.createElement("div");
    div.className = "cube";
    div.innerHTML = `<div class="title">${c.name}</div>
                     Status: ${c.status}<br>
                     Info: ${c.info}`;
    out.appendChild(div);
  });
};
</script>
</head>

<body>
<h2>WATSON :: ERROR MONITOR</h2>
<div id="out"></div>
</body>
</html>
